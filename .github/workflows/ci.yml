name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Engine — unit tests
        working-directory: packages/engine
        run: node --test

      - name: Engine — reference/validation check
        run: node scripts/reference-check.mjs

      - name: Web — production build
        run: npm run build --workspace web

      - name: E2E — install Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E — Playwright suite (QUALITY-SPEC A2–A4)
        run: npm run test:e2e --workspace web
        env:
          CI: "true"
